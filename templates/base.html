<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Build With AI — Alexander AI Course{% endblock %}</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07070f;
  --surface:#0f0f1e;
  --surface2:#161628;
  --border:rgba(255,255,255,0.07);
  --text:#f0f0ff;
  --muted:rgba(255,255,255,0.45);
  --accent:#7c3aed;
  --accent2:#06b6d4;
  --grad:linear-gradient(135deg,#7c3aed,#06b6d4);
  --glow:rgba(124,58,237,0.35);
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:15px;line-height:1.6;overflow-x:hidden}

/* NAV */
.navbar{position:fixed;top:0;left:0;right:0;z-index:1000;display:flex;align-items:center;justify-content:space-between;padding:1rem 2rem;background:rgba(7,7,15,0.75);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.navbar.scrolled{background:rgba(7,7,15,0.97)}
.nav-brand{font-family:'Space Grotesk',sans-serif;font-weight:800;font-size:1.1rem;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none;display:flex;align-items:center;gap:.5rem}
.nav-brand .logo{width:30px;height:30px;border-radius:8px;background:var(--grad);display:inline-flex;align-items:center;justify-content:center;font-size:.9rem;-webkit-text-fill-color:white}
.nav-links{display:flex;align-items:center;gap:.25rem}
.nav-links a{color:var(--muted);text-decoration:none;padding:.45rem .9rem;border-radius:8px;font-size:.87rem;font-weight:500;transition:all .2s}
.nav-links a:hover{color:var(--text);background:rgba(255,255,255,0.06)}
.nav-cta{background:var(--grad);color:white!important;padding:.45rem 1.1rem!important;border-radius:8px;font-weight:600!important}
.nav-cta:hover{opacity:.9;transform:translateY(-1px)}

/* HAMBURGER */
.nav-ham{display:none;background:none;border:none;cursor:pointer;color:var(--muted);font-size:1.4rem;padding:.4rem;border-radius:8px;transition:color .2s}
.nav-ham:hover{color:var(--text)}
.mobile-menu{display:none;position:fixed;top:0;left:0;right:0;background:rgba(7,7,15,0.98);backdrop-filter:blur(24px);border-bottom:1px solid var(--border);z-index:999;padding:5rem 1.5rem 1.5rem;flex-direction:column;gap:.25rem;transform:translateY(-100%);transition:transform .3s ease}
.mobile-menu.open{display:flex;transform:translateY(0)}
.mobile-menu a{color:var(--muted);text-decoration:none;padding:.8rem 1rem;border-radius:10px;font-size:.95rem;font-weight:500;transition:all .2s}
.mobile-menu a:hover{color:var(--text);background:rgba(255,255,255,0.06)}
.mobile-div{height:1px;background:var(--border);margin:.5rem 0}
@media(max-width:768px){
  .nav-links{display:none}
  .nav-ham{display:block}
}

main{padding-top:72px}

/* UTILS */
.container{max-width:1100px;margin:0 auto;padding:0 1.5rem}
.grad-text{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.pill{display:inline-flex;align-items:center;gap:.4rem;background:rgba(124,58,237,.15);color:#c4b5fd;border:1px solid rgba(124,58,237,.3);padding:.3rem .85rem;border-radius:999px;font-size:.78rem;font-weight:600}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;transition:all .3s}
.card:hover{transform:translateY(-4px);border-color:rgba(124,58,237,.35);box-shadow:0 16px 48px rgba(0,0,0,.4)}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:.5rem;padding:.7rem 1.5rem;border-radius:10px;font-weight:600;font-size:.9rem;text-decoration:none;border:none;cursor:pointer;transition:all .2s}
.btn-primary{background:var(--grad);color:white;box-shadow:0 0 24px var(--glow)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 0 40px var(--glow);color:white}
.btn-outline{background:transparent;color:var(--text);border:1px solid var(--border)}
.btn-outline:hover{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.15);color:white}
.btn-sm{padding:.45rem 1rem;font-size:.82rem;border-radius:8px}

/* FOOTER */
footer{background:var(--surface);border-top:1px solid var(--border);padding:2.5rem 1.5rem;margin-top:5rem;text-align:center;color:var(--muted);font-size:.85rem}
footer a{color:var(--muted);text-decoration:none}
footer a:hover{color:var(--text)}
</style>
{% block head %}{% endblock %}
</head>
<body>

<!-- Mobile menu -->
<div class="mobile-menu" id="mobileMenu">
  <a href="/" onclick="closeMM()"><i class="bi bi-house me-2"></i> Home</a>
  <a href="/#modules" onclick="closeMM()"><i class="bi bi-grid me-2"></i> Modules</a>
  <div class="mobile-div"></div>
  <a href="https://alexanderai.site" target="_blank" onclick="closeMM()"><i class="bi bi-arrow-up-right-square me-2"></i> Alexander AI</a>
</div>

<!-- Navbar -->
<nav class="navbar" id="navbar">
  <a href="/" class="nav-brand">
    <span class="logo">🧠</span>
    Build With AI
  </a>
  <div class="nav-links">
    <a href="/">Home</a>
    <a href="/#modules">Modules</a>
    <a href="https://alexanderai.site" target="_blank" class="nav-cta">🚀 Alexander AI</a>
  </div>
  <button class="nav-ham" id="hamBtn" onclick="toggleMM()"><i class="bi bi-list" id="hamIcon"></i></button>
</nav>

<main>
{% block content %}{% endblock %}
</main>

<footer>
  <div style="margin-bottom:.5rem">
    <a href="/">Home</a> &nbsp;·&nbsp;
    <a href="/#modules">Modules</a> &nbsp;·&nbsp;
    <a href="https://alexanderai.site" target="_blank">Alexander AI</a>
  </div>
  © 2026 Alexander AI Integrated Solutions &nbsp;·&nbsp; Build With AI Course &nbsp;·&nbsp; By Jay Alexander
</footer>

<script>
window.addEventListener('scroll',()=>{document.getElementById('navbar').classList.toggle('scrolled',scrollY>20)});
function toggleMM(){const m=document.getElementById('mobileMenu'),i=document.getElementById('hamIcon'),o=m.classList.contains('open');if(o){m.classList.remove('open');i.className='bi bi-list';document.body.style.overflow=''}else{m.classList.add('open');i.className='bi bi-x-lg';document.body.style.overflow='hidden'}}
function closeMM(){const m=document.getElementById('mobileMenu'),i=document.getElementById('hamIcon');m.classList.remove('open');i.className='bi bi-list';document.body.style.overflow=''}
document.addEventListener('click',e=>{const m=document.getElementById('mobileMenu'),b=document.getElementById('hamBtn');if(m&&m.classList.contains('open')&&!m.contains(e.target)&&!b.contains(e.target))closeMM()})
</script>
{% block scripts %}{% endblock %}
</body>
</html>
